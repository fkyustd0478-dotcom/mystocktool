name: Daily Stocks Update

# 放在「公開 repo」的 .github/workflows/fetch_daily.yml

on:
  schedule:
    # 台灣時間 17:45 (UTC 09:45)，週一到週五
    # TWSE/TPEx 盤後資料約 17:30 更新
    - cron: '45 9 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch stocks and events
        run: python scripts/fetch.py   # 就是之前寫的 fetch.py (TWSE/TPEx版)

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json data/events.json
          git diff --cached --quiet && echo "No changes." || (
            git commit -m "stocks: $(date -u '+%Y-%m-%d %H:%M UTC') [bot]"
            git push
          )
