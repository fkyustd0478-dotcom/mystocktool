<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--radius:8px;}
[data-theme="dark"]  { --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --bg4:#30363d; --border:#30363d; --border2:#21262d; --text:#e6edf3; --text2:#8b949e; --text3:#6e7681; --green:#3fb950; --green-dim:#1a3a20; --red:#f85149; --red-dim:#3a1a1a; --blue:#58a6ff; --blue-dim:#1a2a3a; --yellow:#d29922; --accent:#58a6ff; --shadow:rgba(0,0,0,.4); }
[data-theme="light"] { --bg:#f0f2f5; --bg2:#fff; --bg3:#f6f8fa; --bg4:#eaeef2; --border:#d0d7de; --border2:#e8eaed; --text:#1a1f25; --text2:#57606a; --text3:#8c959f; --green:#1a7f37; --green-dim:#dafbe1; --red:#cf222e; --red-dim:#ffebe9; --blue:#0969da; --blue-dim:#ddf4ff; --yellow:#9a6700; --accent:#0969da; --shadow:rgba(0,0,0,.1); }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:40px;font-size:16px;}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:60;box-shadow:0 2px 8px var(--shadow);margin-bottom:12px;}
.hdr h1{font-family:'JetBrains Mono',monospace;font-size:1em;font-weight:700;}
.hdr p{font-size:.68em;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.icon-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:34px;height:34px;border-radius:var(--radius);cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--accent);}

.nav-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;align-items:flex-start;justify-content:flex-start;padding:66px 0 0 12px;}
.nav-ov.open{display:flex;}
.nav-menu{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:6px;min-width:170px;}
.nav-a{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;font-size:.82em;color:var(--text2);text-decoration:none;transition:all .15s;}
.nav-a:hover{background:var(--bg3);color:var(--text);}
.nav-a.active{background:var(--blue-dim);color:var(--blue);}

.pg{max-width:800px;margin:0 auto;padding:0 12px;display:flex;flex-direction:column;gap:16px;}

.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
.card-link{display:flex;flex-direction:column;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;text-decoration:none;color:var(--text);transition:all .15s;}
.card-link:hover{border-color:var(--accent);box-shadow:0 4px 16px var(--shadow);transform:translateY(-2px);}
.card-icon{font-size:1.6em;}
.card-title{font-family:'JetBrains Mono',monospace;font-size:.9em;font-weight:700;}
.card-desc{font-size:.75em;color:var(--text2);line-height:1.5;}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="icon-btn" onclick="toggleNav()">☰</button>
    <div><h1>DASHBOARD</h1><p>工具總覽</p></div>
  </div>
  <button id="theme-btn" onclick="toggleTheme()" style="background:transparent;border:none;color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1.3em;display:flex;align-items:center;justify-content:center;">🌙</button>
</div>

<div class="nav-ov" id="nav-ov" onclick="closeNav()">
  <div class="nav-menu" onclick="event.stopPropagation()">
    <a class="nav-a active" href="index.html">🏠 Dashboard</a>
    <a class="nav-a" href="calculator.html">📊 損益計算機</a>
    <a class="nav-a" href="stocks.html">🔍 股票篩選</a>
    <a class="nav-a" href="events.html">📅 事件</a>
  </div>
</div>

<div class="pg">
  <div class="card-grid">
    <a class="card-link" href="calculator.html">
      <span class="card-icon">📊</span>
      <span class="card-title">損益計算機</span>
      <span class="card-desc">計算股票買賣損益、手續費、交易稅，支援做多/做空與當沖模式。</span>
    </a>
    <a class="card-link" href="stocks.html">
      <span class="card-icon">🔍</span>
      <span class="card-title">股票篩選</span>
      <span class="card-desc">依漲跌幅、三大法人買賣超等條件篩選股票，支援多種排行檢視。</span>
    </a>
    <a class="card-link" href="events.html">
      <span class="card-icon">📅</span>
      <span class="card-title">事件</span>
      <span class="card-desc">追蹤與管理股市相關事件紀錄。</span>
    </a>
  </div>
</div>

<script>
let currTheme='dark';
function applySharedSettings(){
  try{ const s=JSON.parse(localStorage.getItem('stockCalc')||'null'); if(s&&s.theme){ currTheme=s.theme; document.documentElement.setAttribute('data-theme',s.theme); } }catch(e){}
  const btn=document.getElementById('theme-btn'); if(btn) btn.textContent=currTheme==='dark'?'🌙':'☀️';
}
function toggleTheme(){
  currTheme=currTheme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',currTheme);
  const btn=document.getElementById('theme-btn'); if(btn) btn.textContent=currTheme==='dark'?'🌙':'☀️';
  try{ const e=JSON.parse(localStorage.getItem('stockCalc')||'{}'); e.theme=currTheme; localStorage.setItem('stockCalc',JSON.stringify(e)); }catch(e){}
}
function toggleNav(){ document.getElementById('nav-ov').classList.toggle('open'); }
function closeNav(){ document.getElementById('nav-ov').classList.remove('open'); }
window.onload=applySharedSettings;
</script>
</body>
</html>
