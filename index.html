<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<title>股票損益計算機</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root { --radius: 8px; --transition: 0.2s ease; }
[data-theme="dark"] {
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --bg4:#30363d;
  --border:#30363d; --border2:#21262d;
  --text:#e6edf3; --text2:#8b949e; --text3:#6e7681;
  --green:#3fb950; --green-dim:#1a3a20;
  --red:#f85149; --red-dim:#3a1a1a;
  --blue:#58a6ff; --blue-dim:#1a2a3a;
  --yellow:#d29922; --accent:#58a6ff; --shadow:rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg:#f0f2f5; --bg2:#ffffff; --bg3:#f6f8fa; --bg4:#eaeef2;
  --border:#d0d7de; --border2:#e8eaed;
  --text:#1a1f25; --text2:#57606a; --text3:#8c959f;
  --green:#1a7f37; --green-dim:#dafbe1;
  --red:#cf222e; --red-dim:#ffebe9;
  --blue:#0969da; --blue-dim:#ddf4ff;
  --yellow:#9a6700; --accent:#0969da; --shadow:rgba(0,0,0,0.1);
}
[data-fontsize="sm"] { font-size:17px; }
[data-fontsize="md"] { font-size:21px; }
[data-fontsize="lg"] { font-size:26px; }
[data-fontsize="xl"] { font-size:30px; }
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; font-size:21px; transition:background var(--transition),color var(--transition); min-height:100vh; padding-bottom:40px; }

/* ─── Header ─── */
.app-header { display:flex; align-items:center; justify-content:space-between; padding:10px 18px; background:var(--bg2); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; box-shadow:0 2px 8px var(--shadow); margin-bottom:14px; }
.app-header h1 { font-family:'JetBrains Mono',monospace; font-size:1.1em; font-weight:700; color:var(--text); letter-spacing:-0.3px; }
.app-header p { font-size:0.7em; color:var(--text3); font-family:'JetBrains Mono',monospace; }
.theme-btn { background:transparent; border:none; color:var(--text2); width:32px; height:32px; border-radius:var(--radius); cursor:pointer; font-size:1.3em; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
.theme-btn:hover { color:var(--text); }
.nav-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text2); width:36px; height:36px; border-radius:var(--radius); cursor:pointer; font-size:1.1em; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
.nav-btn:hover { background:var(--bg4); color:var(--text); border-color:var(--accent); }
.nav-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); z-index:200; align-items:flex-start; justify-content:flex-start; padding:70px 0 0 14px; }
.nav-overlay.open { display:flex; }
.nav-menu { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:8px; min-width:180px; font-size:21px; animation:modalIn .15s ease; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:8px; cursor:pointer; font-size:.75em; color:var(--text2); transition:all .15s; font-family:'Noto Sans TC',sans-serif; white-space:nowrap; text-decoration:none; }
.nav-item:hover { background:var(--bg3); color:var(--text); }
.nav-item.active { background:var(--blue-dim); color:var(--blue); }
.nav-item .ni { font-size:1.2em; }

/* ─── App body ─── */
.app-body { display:flex; flex-direction:column; gap:12px; max-width:860px; margin:0 auto; padding:0 14px; }

/* ─── Card ─── */
.card, .profit-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:background var(--transition),border-color var(--transition); }
.card-header { display:flex; align-items:center; justify-content:space-between; padding:9px 14px; border-bottom:1px solid var(--border2); background:var(--bg2); gap:8px; flex-wrap:wrap; }
.card-title { display:flex; align-items:center; gap:7px; font-size:0.72em; font-weight:500; color:var(--text2); text-transform:uppercase; letter-spacing:1px; font-family:'JetBrains Mono',monospace; white-space:nowrap; }
.dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dot-blue  { background:var(--blue);  box-shadow:0 0 5px var(--blue); }
.dot-green { background:var(--green); box-shadow:0 0 5px var(--green); }
.dot-red   { background:var(--red);   box-shadow:0 0 5px var(--red); }

/* ─── Toggle buttons ─── */
.tog-btn { background:var(--bg3); border:1px solid var(--border); border-radius:6px; cursor:pointer; font-size:.72em; font-family:'JetBrains Mono',monospace; padding:4px 10px; color:var(--text2); transition:all .15s; white-space:nowrap; flex-shrink:0; }
.tog-btn:hover { border-color:var(--accent); color:var(--text); }
.tog-btn.long  { background:var(--blue-dim); border-color:var(--blue);  color:var(--blue); }
.tog-btn.short { background:var(--red-dim);  border-color:var(--red);   color:var(--red); }
.tog-btn.daytrade { background:var(--green-dim); border-color:var(--green); color:var(--green); }
.disc-trigger { background:var(--bg3); border:1px solid var(--border); border-radius:6px; cursor:pointer; font-size:.72em; font-family:'JetBrains Mono',monospace; padding:4px 10px; color:var(--text2); transition:all .15s; white-space:nowrap; flex-shrink:0; }
.disc-trigger:hover { border-color:var(--yellow); color:var(--yellow); }
.disc-trigger.active { border-color:var(--yellow); color:var(--yellow); background:#2a200040; }
[data-theme="light"] .disc-trigger.active { background:#fff3cd; }

/* ─── Rows ─── */
.rows-wrap { padding:10px 12px; }
.row-item { display:grid; grid-template-columns:1fr 1fr 28px; gap:6px; margin-bottom:6px; animation:fadeIn .18s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }
.input-group { position:relative; display:flex; align-items:center; }
.input-label { position:absolute; left:8px; top:4px; font-size:0.63em; color:var(--text3); font-family:'JetBrains Mono',monospace; pointer-events:none; line-height:1; }
.input-group input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:.95em; font-weight:600; padding:18px 38px 4px 8px; outline:none; transition:border-color .15s,background .15s; -moz-appearance:textfield; }
.input-group input::-webkit-inner-spin-button, .input-group input::-webkit-outer-spin-button { -webkit-appearance:none; }
.input-group input:focus { border-color:var(--accent); background:var(--bg4); }
.input-unit { position:absolute; right:7px; bottom:5px; font-size:0.63em; color:var(--text3); font-family:'JetBrains Mono',monospace; pointer-events:none; }
.unit-btn { position:absolute; right:5px; bottom:3px; font-size:0.63em; font-family:'JetBrains Mono',monospace; background:var(--bg4); border:1px solid var(--border); border-radius:3px; padding:1px 5px; cursor:pointer; transition:all .15s; line-height:1.4; user-select:none; color:var(--blue); }
.unit-btn:hover { border-color:var(--accent); background:var(--blue-dim); }
.unit-btn.share { color:var(--yellow); border-color:var(--yellow); }
[data-theme="dark"]  .unit-btn.share { background:#2a200060; }
[data-theme="light"] .unit-btn.share { background:#fff3cd; }
.del-btn { background:transparent; border:1px solid transparent; color:var(--text3); width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:.85em; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; align-self:end; margin-bottom:1px; }
.del-btn:hover { background:var(--red-dim); border-color:var(--red); color:var(--red); }
.add-wrap { padding:0 12px; }
.add-btn { display:flex; align-items:center; justify-content:center; gap:5px; background:transparent; border:1px dashed var(--border); color:var(--text3); font-size:.75em; padding:5px 14px; border-radius:var(--radius); cursor:pointer; transition:all .15s; width:100%; margin-bottom:8px; font-family:'Noto Sans TC',sans-serif; }
.add-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--blue-dim); }

/* ─── Summary ─── */
.summary { display:flex; gap:1px; border-top:1px solid var(--border2); background:var(--border2); overflow:hidden; }
.summary-item { flex:1; background:var(--bg2); padding:8px 10px; min-width:0; }
.summary-label { font-size:.62em; color:var(--text3); text-transform:uppercase; letter-spacing:.7px; font-family:'JetBrains Mono',monospace; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.summary-value { font-family:'JetBrains Mono',monospace; font-size:clamp(0.75rem, 2vw, .95em); font-weight:700; color:var(--text); word-break:break-all; overflow-wrap:anywhere; line-height:1.2; }
.summary-value.green { color:var(--green); }
.summary-value.red   { color:var(--red); }
.summary-value.blue  { color:var(--blue); }
.summary-sub { font-size:.6em; color:var(--text3); margin-top:1px; font-family:'JetBrains Mono',monospace; }

/* ─── Suggest bar ─── */
.suggest-bar { display:flex; align-items:center; gap:6px; flex-wrap:wrap; padding:5px 12px; background:var(--bg3); border-top:1px solid var(--border2); font-size:.65em; font-family:'JetBrains Mono',monospace; color:var(--text3); }
.suggest-price { font-weight:700; font-size:1.1em; color:var(--green); font-family:'JetBrains Mono',monospace; }

/* ─── Profit card ─── */
.profit-display { display:flex; gap:1px; background:var(--border2); }
.profit-item { flex:1; background:var(--bg2); padding:14px; min-width:0; transition:background .2s; }
.profit-item.highlight-green { background:linear-gradient(135deg,var(--bg2) 0%,var(--green-dim) 100%); border-bottom:2px solid var(--green); }
.profit-item.highlight-red   { background:linear-gradient(135deg,var(--bg2) 0%,var(--red-dim) 100%);   border-bottom:2px solid var(--red); }
.profit-amount { font-family:'JetBrains Mono',monospace; font-weight:700; margin-bottom:4px; font-size:clamp(1rem, 3.5vw, 1.6em); word-break:break-all; overflow-wrap:anywhere; line-height:1.2; }
.profit-amount.green   { color:var(--green); }
.profit-amount.red     { color:var(--red); }
.profit-amount.neutral { color:var(--text2); }
.profit-label { font-size:.65em; color:var(--text3); text-transform:uppercase; letter-spacing:.8px; font-family:'JetBrains Mono',monospace; }
.profit-breakdown { font-size:.65em; color:var(--text3); font-family:'JetBrains Mono',monospace; margin-top:5px; line-height:1.8; word-break:break-all; }

/* ─── Modals ─── */
@keyframes modalIn { from{opacity:0;transform:scale(.95) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:20px; width:340px; max-width:calc(100vw - 20px); max-height:calc(100vh - 28px); overflow-y:auto; animation:modalIn .18s ease; font-size:21px; }
.modal-title { font-size:1em; font-weight:700; margin-bottom:16px; color:var(--text); display:flex; align-items:center; gap:8px; }
.setting-group { margin-bottom:14px; }
.setting-label { font-size:.7em; color:var(--text2); margin-bottom:7px; font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:.5px; }
.divider { border:none; border-top:1px solid var(--border2); margin:4px 0 14px; }
.icon-btn-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
.icon-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text2); padding:9px 6px; border-radius:8px; cursor:pointer; font-size:.75em; transition:all .15s; text-align:center; line-height:1.5; font-family:'Noto Sans TC',sans-serif; display:flex; flex-direction:column; align-items:center; gap:3px; }
.icon-btn .ie { font-size:1.4em; }
.icon-btn:hover, .icon-btn.active { background:var(--blue-dim); border-color:var(--accent); color:var(--accent); }
.fontsize-row { display:flex; gap:6px; }
.fs-btn { flex:1; background:var(--bg3); border:1px solid var(--border); color:var(--text2); padding:6px 4px; border-radius:6px; cursor:pointer; transition:all .15s; font-family:'JetBrains Mono',monospace; text-align:center; }
.fs-btn:hover, .fs-btn.active { background:var(--blue-dim); border-color:var(--accent); color:var(--accent); }
.fs-sm{font-size:17px;} .fs-md{font-size:21px;} .fs-lg{font-size:26px;} .fs-xl{font-size:30px;}
.preset-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text2); padding:5px 4px; border-radius:6px; cursor:pointer; font-size:.75em; transition:all .15s; font-family:'JetBrains Mono',monospace; text-align:center; line-height:1.3; }
.preset-btn:hover, .preset-btn.active { background:var(--blue-dim); border-color:var(--accent); color:var(--accent); }
.manual-input-wrap { display:flex; align-items:center; gap:8px; }
.manual-input-wrap input { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:.88em; padding:7px 10px; outline:none; transition:border-color .15s; -moz-appearance:textfield; }
.manual-input-wrap input::-webkit-inner-spin-button { -webkit-appearance:none; }
.manual-input-wrap input:focus { border-color:var(--accent); }
.close-btn { width:100%; background:var(--accent); border:none; color:#fff; padding:9px; border-radius:8px; cursor:pointer; font-size:.88em; font-family:'Noto Sans TC',sans-serif; font-weight:500; transition:opacity .15s; margin-top:4px; }
.close-btn:hover { opacity:.85; }

/* ─── Discount modal ─── */
.disc-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); z-index:200; align-items:center; justify-content:center; }
.disc-overlay.open { display:flex; }
.disc-modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:20px; width:340px; max-width:calc(100vw - 20px); animation:modalIn .18s ease; font-size:21px; }
.disc-modal-title { font-size:1em; font-weight:700; margin-bottom:16px; color:var(--text); display:flex; align-items:center; gap:8px; }
.disc-opts-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:14px; }
.disc-opt { background:var(--bg3); border:1px solid var(--border); border-radius:8px; cursor:pointer; font-size:.82em; font-family:'JetBrains Mono',monospace; padding:10px 6px; color:var(--text2); transition:all .15s; text-align:center; line-height:1.4; }
.disc-opt:hover, .disc-opt.active { background:var(--blue-dim); border-color:var(--accent); color:var(--accent); }
.disc-custom-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.disc-custom-row input { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:.88em; padding:7px 10px; outline:none; -moz-appearance:textfield; min-width:0; }
.disc-custom-row input::-webkit-inner-spin-button { -webkit-appearance:none; }
.disc-custom-row input:focus { border-color:var(--accent); }
.disc-custom-row span { font-size:.75em; color:var(--text3); white-space:nowrap; }
.disc-custom-row button { background:var(--accent); border:none; border-radius:6px; color:#fff; font-size:.82em; padding:7px 12px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.disc-custom-row button:hover { opacity:.85; }
.disc-close-btn { width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text2); padding:9px; border-radius:8px; cursor:pointer; font-size:.88em; font-family:'Noto Sans TC',sans-serif; transition:all .15s; }
.disc-close-btn:hover { background:var(--bg4); color:var(--text); }
</style>
</head>
<body>

<div class="app-header">
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="nav-btn" onclick="toggleNav()" title="選單">☰</button>
    <div>
      <h1>STOCK · P&amp;L</h1>
      <p>股票損益計算機</p>
    </div>
  </div>
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="切換背景">🌙</button>
</div>

<!-- NAV -->
<div class="nav-overlay" id="nav-overlay" onclick="closeNav()">
  <div class="nav-menu" onclick="event.stopPropagation()">
    <a class="nav-item active" href="index.html"><span class="ni">📊</span>損益計算機</a>
    <a class="nav-item" href="stocks.html"><span class="ni">🔍</span>股票篩選</a>
    <a class="nav-item" href="events.html"><span class="ni">📅</span>事件</a>
  </div>
</div>

<!-- MIN FEE MODAL -->
<div class="disc-overlay" id="fee-overlay" onclick="closeFeePopup()">
  <div class="disc-modal" onclick="event.stopPropagation()">
    <div class="disc-modal-title">💰 最低手續費</div>
    <div style="display:flex;gap:6px;margin-bottom:12px;">
      <button class="disc-opt" onclick="setMinFeePreset(20)">快速 20 元</button>
      <button class="disc-opt" onclick="setMinFeePreset(1)">快速 1 元</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="font-size:.7em;color:var(--text3);font-family:'JetBrains Mono',monospace;white-space:nowrap;width:64px;">整張（張）</span>
      <input type="number" id="min-fee-lot" placeholder="20" min="1" step="1" style="width:64px;text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.88em;padding:6px 8px;outline:none;-moz-appearance:textfield;">
      <span style="font-size:.7em;color:var(--text3);">元</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <span style="font-size:.7em;color:var(--text3);font-family:'JetBrains Mono',monospace;white-space:nowrap;width:64px;">零股（股）</span>
      <input type="number" id="min-fee-share" placeholder="20" min="1" step="1" style="width:64px;text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.88em;padding:6px 8px;outline:none;-moz-appearance:textfield;">
      <span style="font-size:.7em;color:var(--text3);">元</span>
    </div>
    <div style="font-size:.65em;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:14px;">
      目前：整張 <span id="min-fee-lot-label" style="color:var(--yellow)">20</span> 元 / 零股 <span id="min-fee-share-label" style="color:var(--yellow)">20</span> 元
    </div>
    <button class="disc-close-btn" onclick="closeFeePopup()">確認</button>
  </div>
</div>

<div class="app-body">

  <!-- BUY -->
  <div class="card" id="card-buy">
    <div class="card-header" style="flex-wrap:wrap;gap:6px;">
      <div class="card-title" id="buy-card-title"><span class="dot dot-blue" id="buy-dot"></span><span id="buy-title-text">買進紀錄</span></div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap;margin-left:auto;">
        <input type="checkbox" id="daytrade-toggle" style="display:none">
        <button class="tog-btn long" id="dir-tog" onclick="toggleDirection()">做多</button>
        <button class="tog-btn" id="dt-tog" onclick="toggleDayTrade()">非當沖</button>
        <div style="position:relative;">
          <button class="disc-trigger" id="disc-trigger" onclick="toggleDiscPopup()">無折扣</button>
        </div>
        <button class="tog-btn" id="fee-btn" onclick="toggleFeePopup()" style="font-size:.65em;line-height:1.2;padding:3px 8px;">最低<br><span id="fee-label">20元</span></button>
      </div>
    </div>
    <div class="rows-wrap" id="buy-rows"></div>
    <div class="add-wrap">
      <button class="add-btn" id="buy-add-btn" onclick="addBuyRow()">＋ 新增買進</button>
    </div>
    <div class="summary">
      <div class="summary-item">
        <div class="summary-label" id="buy-avg-label">均攤成本/股</div>
        <div class="summary-value blue" id="avg-cost">—</div>
        <div class="summary-sub" id="avg-cost-sub">含手續費</div>
      </div>
      <div class="summary-item">
        <div class="summary-label" id="buy-shares-label">總股數</div>
        <div class="summary-value" id="total-buy-lots">0 股</div>
        <div class="summary-sub" id="total-buy-shares"></div>
      </div>
      <div class="summary-item">
        <div class="summary-label" id="buy-cost-label">總成本</div>
        <div class="summary-value" id="total-buy-cost">—</div>
        <div class="summary-sub">含手續費</div>
      </div>
    </div>
    <div class="suggest-bar" id="suggest-bar"></div>
  </div>

  <!-- SELL -->
  <div class="card" id="card-sell">
    <div class="card-header">
      <div class="card-title"><span class="dot dot-red" id="sell-dot"></span><span id="sell-title-text">賣出紀錄</span></div>
    </div>
    <div class="rows-wrap" id="sell-rows"></div>
    <div class="add-wrap">
      <button class="add-btn" id="sell-add-btn" onclick="addSellRow()">＋ 新增賣出</button>
    </div>
    <div class="summary">
      <div class="summary-item">
        <div class="summary-label" id="sell-shares-label">總賣出股數</div>
        <div class="summary-value" id="total-sell-lots">0 股</div>
      </div>
      <div class="summary-item">
        <div class="summary-label" id="sell-amount-label">到手金額</div>
        <div class="summary-value" id="total-sell-amount">—</div>
        <div class="summary-sub">含手續費和交易稅</div>
      </div>
    </div>
  </div>

  <!-- PROFIT -->
  <div class="profit-card">
    <div class="card-header">
      <div class="card-title"><span class="dot dot-green"></span>損益結果</div>
    </div>
    <div class="profit-display">
      <div class="profit-item" id="profit-main">
        <div class="profit-amount neutral" id="profit-amount">—</div>
        <div class="profit-label">損益金額</div>
        <div class="profit-breakdown" id="profit-breakdown"></div>
      </div>
      <div class="profit-item" id="profit-pct-item">
        <div class="profit-amount neutral" id="profit-pct">—</div>
        <div class="profit-label">損益率</div>
        <div class="profit-breakdown" id="profit-breakdown2"></div>
      </div>
    </div>
  </div>

</div>

<!-- DISCOUNT MODAL -->
<div class="disc-overlay" id="disc-overlay" onclick="closeDiscPopup()">
  <div class="disc-modal" onclick="event.stopPropagation()">
    <div class="disc-modal-title">💸 手續費折扣</div>
    <div class="disc-opts-grid">
      <button class="disc-opt active" id="dopt-1"    onclick="setDiscOpt(1)">無折扣</button>
      <button class="disc-opt"        id="dopt-0.6"  onclick="setDiscOpt(0.6)">6折</button>
      <button class="disc-opt"        id="dopt-0.28" onclick="setDiscOpt(0.28)">2.8折</button>
      <button class="disc-opt"        id="dopt-0.18" onclick="setDiscOpt(0.18)">1.8折</button>
    </div>
    <div style="font-size:.7em;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:8px;">自訂折數</div>
    <div class="disc-custom-row">
      <input type="number" id="disc-custom-val" placeholder="例如 2.5" min="0.1" max="10" step="0.1">
      <span>折</span>
      <button onclick="applyDiscCustom(document.getElementById('disc-custom-val').value)">套用</button>
    </div>
    <button class="disc-close-btn" onclick="closeDiscPopup()">關閉</button>
  </div>
</div>


<script>
let discount=1, buyRows=[], sellRows=[], buyId=0, sellId=0;
let currTheme='dark', currFs='md';
let minFeeLot=20, minFeeShare=20;
let shortMode=false;

window.onload=()=>{ loadSettings(); addBuyRow(); addBuyRow(); addSellRow(); updateModeLabels(); recalc(); updateFeeBtn(); };

/* ── Nav ── */
function toggleNav(){ document.getElementById('nav-overlay').classList.toggle('open'); }
function closeNav(){ document.getElementById('nav-overlay').classList.remove('open'); }

/* ── Theme toggle ── */
function toggleTheme(){
  currTheme = currTheme==='dark' ? 'light' : 'dark';
  setTheme(currTheme);
  saveSettings();
}
function setTheme(t){
  currTheme=t;
  document.documentElement.setAttribute('data-theme',t);
  const btn=document.getElementById('theme-btn');
  if(btn) btn.textContent = t==='dark' ? '🌙' : '☀️';
}

/* ── Min fee popup ── */
function toggleFeePopup(){
  document.getElementById('fee-overlay').classList.toggle('open');
  document.getElementById('min-fee-lot').value=minFeeLot;
  document.getElementById('min-fee-share').value=minFeeShare;
  updateMinFeeLabels();
}
function closeFeePopup(){
  const mfl=parseFloat(document.getElementById('min-fee-lot').value);
  const mfs=parseFloat(document.getElementById('min-fee-share').value);
  minFeeLot   = (!isNaN(mfl)&&mfl>=1) ? Math.floor(mfl) : 20;
  minFeeShare = (!isNaN(mfs)&&mfs>=1) ? Math.floor(mfs) : 20;
  updateMinFeeLabels();
  updateFeeBtn();
  document.getElementById('fee-overlay').classList.remove('open');
  saveSettings(); recalc();
}
function updateFeeBtn(){
  const lbl=document.getElementById('fee-label');
  if(lbl) lbl.textContent = minFeeLot===minFeeShare ? `${minFeeLot}元` : `${minFeeLot}/${minFeeShare}元`;
}
function setMinFeePreset(val){
  document.getElementById('min-fee-lot').value=val;
  document.getElementById('min-fee-share').value=val;
}
function updateMinFeeLabels(){
  document.getElementById('min-fee-lot-label').textContent=minFeeLot;
  document.getElementById('min-fee-share-label').textContent=minFeeShare;
}

/* ── Row Management ── */
function addBuyRow()  { buyRows.push({id:++buyId,price:'',lots:'',unit:'張'}); renderBuyRows(); recalc(); }
function addSellRow() { sellRows.push({id:++sellId,price:'',lots:'',unit:'張'}); renderSellRows(); recalc(); }
function delBuyRow(id)  { if(buyRows.length<=1)return; buyRows=buyRows.filter(r=>r.id!==id); renderBuyRows(); recalc(); }
function delSellRow(id) { if(sellRows.length<=1)return; sellRows=sellRows.filter(r=>r.id!==id); renderSellRows(); recalc(); }
function clearBuyRow(id)  { const r=buyRows.find(r=>r.id===id); if(r){r.price='';r.lots='';r.unit='張';} renderBuyRows(); recalc(); }
function clearSellRow(id) { const r=sellRows.find(r=>r.id===id); if(r){r.price='';r.lots='';r.unit='張';} renderSellRows(); recalc(); }
function toggleBuyUnit(id){ const r=buyRows.find(r=>r.id===id); if(!r)return; r.unit=r.unit==='張'?'股':'張'; r.lots=''; renderBuyRows(); recalc(); }
function toggleSellUnit(id){ const r=sellRows.find(r=>r.id===id); if(!r)return; r.unit=r.unit==='張'?'股':'張'; r.lots=''; renderSellRows(); recalc(); }
function updateBuyRow(id,f,v){ const r=buyRows.find(r=>r.id===id); if(!r)return; if(f==='lots'&&r.unit==='股'){const n=parseFloat(v);r[f]=isNaN(n)?'':(n>999?999:n<0?0:n);}else{r[f]=v===''?'':parseFloat(v);} recalc(); }
function updateSellRow(id,f,v){ const r=sellRows.find(r=>r.id===id); if(!r)return; if(f==='lots'&&r.unit==='股'){const n=parseFloat(v);r[f]=isNaN(n)?'':(n>999?999:n<0?0:n);}else{r[f]=v===''?'':parseFloat(v);} recalc(); }

/* ── Direction / DayTrade ── */
function toggleDirection(){
  shortMode=!shortMode;
  const btn=document.getElementById('dir-tog');
  btn.textContent=shortMode?'做空':'做多'; btn.className='tog-btn '+(shortMode?'short':'long');
  updateModeLabels(); renderBuyRows(); renderSellRows(); recalc();
}
function toggleDayTrade(){
  const cb=document.getElementById('daytrade-toggle'); cb.checked=!cb.checked;
  const btn=document.getElementById('dt-tog');
  btn.textContent=cb.checked?'當沖':'非當沖'; btn.className='tog-btn'+(cb.checked?' daytrade':'');
  recalc();
}
function updateModeLabels(){
  const c1S=shortMode;
  document.getElementById('buy-dot').className='dot '+(c1S?'dot-red':'dot-blue');
  document.getElementById('buy-title-text').textContent=c1S?'賣出紀錄（開空）':'買進紀錄';
  document.getElementById('buy-add-btn').textContent=c1S?'＋ 新增賣出':'＋ 新增買進';
  document.getElementById('buy-avg-label').textContent=c1S?'均攤賣出價/股':'均攤成本/股';
  document.getElementById('buy-shares-label').textContent=c1S?'總賣出股數':'總股數';
  document.getElementById('buy-cost-label').textContent=c1S?'總賣出金額':'總成本';
  const c2B=shortMode;
  document.getElementById('sell-dot').className='dot '+(c2B?'dot-blue':'dot-red');
  document.getElementById('sell-title-text').textContent=c2B?'買進紀錄（回補）':'賣出紀錄';
  document.getElementById('sell-add-btn').textContent=c2B?'＋ 新增買進':'＋ 新增賣出';
  document.getElementById('sell-shares-label').textContent=c2B?'總買進股數':'總賣出股數';
  document.getElementById('sell-amount-label').textContent=c2B?'回補總成本':'到手金額';
}

/* ── Render ── */
function rowHTML(r,idx,type){
  const isFirst=idx===0;
  const btnAction=isFirst?`clear${type}Row(${r.id})`:`del${type}Row(${r.id})`;
  const btnTitle=isFirst?'清空':'刪除';
  const isShare=r.unit==='股';
  const lotsLabel=isShare?'股數 (≤999)':'張數';
  const lotsMax=isShare?' max="999"':'';
  const unitCls=isShare?'unit-btn share':'unit-btn';
  const unitTip=isShare?'點擊切換為張':'點擊切換為股';
  const priceLabel=type==='Buy'?(shortMode?'賣出股價':'買進股價'):(shortMode?'買進股價':'賣出股價');
  return `
    <div class="input-group"><span class="input-label">${priceLabel}</span>
      <input type="number" value="${r.price}" placeholder="0" min="0" step="0.01" oninput="update${type}Row(${r.id},'price',this.value)">
      <span class="input-unit">元</span></div>
    <div class="input-group"><span class="input-label">${lotsLabel}</span>
      <input type="number" value="${r.lots}" placeholder="0" min="0" step="1"${lotsMax} oninput="update${type}Row(${r.id},'lots',this.value)">
      <button class="${unitCls}" onclick="toggle${type}Unit(${r.id})" title="${unitTip}">${r.unit}</button></div>
    <button class="del-btn" onclick="${btnAction}" title="${btnTitle}">✕</button>`;
}
function renderBuyRows(){ const c=document.getElementById('buy-rows'); c.innerHTML=''; buyRows.forEach((r,i)=>{ const d=document.createElement('div'); d.className='row-item'; d.innerHTML=rowHTML(r,i,'Buy'); c.appendChild(d); }); }
function renderSellRows(){ const c=document.getElementById('sell-rows'); c.innerHTML=''; sellRows.forEach((r,i)=>{ const d=document.createElement('div'); d.className='row-item'; d.innerHTML=rowHTML(r,i,'Sell'); c.appendChild(d); }); }

/* ── Calculation ── */
function rowShares(r){ return r.unit==='張'?(parseFloat(r.lots)||0)*1000:Math.min(parseFloat(r.lots)||0,999); }
function calcFee(sv,unit){ return Math.max(Math.floor(sv*0.001425*discount),unit==='張'?minFeeLot:minFeeShare); }
function calcTax(sv,dt){ return Math.floor(sv*(dt?0.0015:0.003)); }

function recalc(){
  const isDayTrade=document.getElementById('daytrade-toggle').checked;
  let card1Total=0,card1Shares=0;
  buyRows.forEach(r=>{ const p=parseFloat(r.price)||0,s=rowShares(r); if(p<=0||s<=0)return; const sv=p*s,fee=calcFee(sv,r.unit); if(shortMode){const tax=calcTax(sv,isDayTrade);card1Total+=sv-fee-tax;}else{card1Total+=sv+fee;} card1Shares+=s; });
  const avg=card1Shares>0?card1Total/card1Shares:0;
  setVal('avg-cost',card1Shares>0?`${fmt(avg)} 元`:'—',card1Shares>0?'blue':'');
  document.getElementById('total-buy-lots').textContent=card1Shares>0?`${card1Shares.toLocaleString()} 股`:'0 股';
  document.getElementById('total-buy-shares').textContent='';
  setVal('total-buy-cost',card1Total>0?`${fmtI(card1Total)} 元`:'—');

  let card2Total=0,card2Shares=0;
  sellRows.forEach(r=>{ const p=parseFloat(r.price)||0,s=rowShares(r); if(p<=0||s<=0)return; const sv=p*s,fee=calcFee(sv,r.unit); if(shortMode){card2Total+=sv+fee;}else{const tax=calcTax(sv,isDayTrade);card2Total+=sv-fee-tax;} card2Shares+=s; });
  document.getElementById('total-sell-lots').textContent=card2Shares>0?`${card2Shares.toLocaleString()} 股`:'0 股';
  setVal('total-sell-amount',card2Total>0?`${fmtI(card2Total)} 元`:'—');

  let sellNet,buyCost,matchedShares;
  if(shortMode){ matchedShares=card2Shares; sellNet=(card1Shares>0?card1Total/card1Shares:0)*matchedShares; buyCost=card2Total; }
  else{ matchedShares=card2Shares; buyCost=avg*matchedShares; sellNet=card2Total; }
  const profit=(sellNet>0&&buyCost>0)?sellNet-buyCost:null;
  const pct=profit!==null&&buyCost>0?(profit/buyCost)*100:null;

  const pa=document.getElementById('profit-amount'),pp=document.getElementById('profit-pct');
  const pm=document.getElementById('profit-main'),pi=document.getElementById('profit-pct-item');
  const pb=document.getElementById('profit-breakdown'),pb2=document.getElementById('profit-breakdown2');
  if(profit!==null){
    const pos=profit>=0,cls=pos?'green':'red',hl=pos?'highlight-green':'highlight-red';
    pa.textContent=(pos?'+':'')+fmtI(profit)+' 元'; pa.className=`profit-amount ${cls}`;
    pp.textContent=(pos?'+':'')+pct.toFixed(2)+'%'; pp.className=`profit-amount ${cls}`;
    pm.className=`profit-item ${hl}`; pi.className=`profit-item ${hl}`;
    pb.innerHTML=`賣出金額：${fmtI(sellNet)}<br>買進成本：${fmtI(buyCost)}`;
    pb2.innerHTML=`${shortMode?'回補':'賣出'} ${matchedShares.toLocaleString()} 股<br>均價 ${fmt(shortMode?card2Shares>0?card2Total/card2Shares:0:avg)} 元`;
  } else {
    pa.textContent='—'; pa.className='profit-amount neutral'; pp.textContent='—'; pp.className='profit-amount neutral';
    pm.className='profit-item'; pi.className='profit-item'; pb.innerHTML=''; pb2.innerHTML='';
  }
  calcSuggest(isDayTrade);
}

/* ── Suggest logic: decide what to pass to updateSuggest ── */
function calcSuggest(isDayTrade){
  // 找出所有有填入股價的 row（card1 = buyRows）
  const priceRows = buyRows.filter(r => parseFloat(r.price) > 0);
  if(priceRows.length === 0){ updateSuggest(0,0,isDayTrade); return; }

  const allHaveLots = priceRows.every(r => rowShares(r) > 0);
  const noneHaveLots = priceRows.every(r => rowShares(r) === 0);

  if(priceRows.length === 1 && noneHaveLots){
    // 只有一行且只填了股價 → 預設以 1 張計算
    const r = priceRows[0];
    const p = parseFloat(r.price), s = 1000; // 1張 = 1000股
    const sv = p * s;
    const fee = Math.max(Math.floor(sv * 0.001425 * discount), minFeeLot);
    let total;
    if(shortMode){ const tax=Math.floor(sv*(isDayTrade?0.0015:0.003)); total=sv-fee-tax; }
    else{ total=sv+fee; }
    updateSuggest(total, s, isDayTrade, true);  // true = 顯示「以1張計算」提示
  } else if(allHaveLots){
    // 所有有股價的 row 都已填張數 → 用實際數字
    // 重新算 card1Total（因為 recalc 裡的已算好，直接讀 DOM 比較麻煩，重算較乾淨）
    let c1Total=0, c1Shares=0;
    buyRows.forEach(r=>{
      const p=parseFloat(r.price)||0, s=rowShares(r);
      if(p<=0||s<=0)return;
      const sv=p*s, fee=Math.max(Math.floor(sv*0.001425*discount),r.unit==='張'?minFeeLot:minFeeShare);
      if(shortMode){const tax=Math.floor(sv*(isDayTrade?0.0015:0.003));c1Total+=sv-fee-tax;}
      else{c1Total+=sv+fee;}
      c1Shares+=s;
    });
    updateSuggest(c1Total, c1Shares, isDayTrade);
  } else {
    // 部分有填張數、部分沒填 → 等全部填完再顯示
    updateSuggest(0, 0, isDayTrade);
  }
}

/* ── Settings ── */
function setFontSize(s){ currFs=s; document.documentElement.setAttribute('data-fontsize',s); ['sm','md','lg','xl'].forEach(v=>{ const b=document.getElementById(`fs-${v}`); if(b)b.classList.toggle('active',v===s); }); }

/* ── Discount ── */
function toggleDiscPopup(){ document.getElementById('disc-overlay').classList.toggle('open'); }
function closeDiscPopup(){ document.getElementById('disc-overlay').classList.remove('open'); }
function setDiscOpt(val){ discount=val; updateDiscButtons(); saveSettings(); recalc(); closeDiscPopup(); }
function applyDiscCustom(v){ const n=parseFloat(v); if(!isNaN(n)&&n>0){ discount=+(n/10).toFixed(6); updateDiscButtons(); saveSettings(); recalc(); closeDiscPopup(); } }
function updateDiscButtons(){
  [1,0.6,0.28,0.18].forEach(k=>{ const b=document.getElementById(`dopt-${k}`); if(b)b.classList.toggle('active',Math.abs(discount-k)<1e-9); });
  const t=document.getElementById('disc-trigger');
  if(Math.abs(discount-1)<1e-9) t.textContent='無折扣';
  else if(Math.abs(discount-0.6)<1e-9) t.textContent='6折';
  else if(Math.abs(discount-0.28)<1e-9) t.textContent='2.8折';
  else if(Math.abs(discount-0.18)<1e-9) t.textContent='1.8折';
  else t.textContent=`${(discount*10).toFixed(1)}折`;
  t.className=(discount===1)?'disc-trigger':'disc-trigger active';
}

function saveSettings(){ try{ localStorage.setItem('stockCalc',JSON.stringify({theme:currTheme,fs:currFs,discount,minFeeLot,minFeeShare})); }catch(e){} }
function loadSettings(){ try{ const s=JSON.parse(localStorage.getItem('stockCalc')||'null'); if(!s)return; if(s.theme){currTheme=s.theme;setTheme(s.theme);} if(s.discount>0){discount=s.discount;updateDiscButtons();} if(s.minFeeLot>=1)minFeeLot=s.minFeeLot; if(s.minFeeShare>=1)minFeeShare=s.minFeeShare; }catch(e){} }

/* ── Tick / Suggest ── */
function tickSize(p){ if(p<10)return 0.01; if(p<50)return 0.05; if(p<100)return 0.1; if(p<500)return 0.5; if(p<1000)return 1; return 5; }
function fmtPrice(p){ const t=tickSize(p); if(t<0.1)return p.toFixed(2); if(t<1)return p.toFixed(1); return p.toFixed(0); }
function ceilTick(price){ const t=tickSize(price); const r=Math.round(price/t)*t; return +(r<price-1e-9?r+t:r).toFixed(6); }
function floorTick(price){ const t=tickSize(price); const r=Math.round(price/t)*t; return +(r>price+1e-9?r-t:r).toFixed(6); }
function updateSuggest(c1Total,c1Shares,isDayTrade,isDefault){
  const sb=document.getElementById('suggest-bar'); if(c1Shares<=0||c1Total<=0){sb.innerHTML='';return;}
  const defaultHint = isDefault ? '<span style="color:var(--text3);font-size:.85em">（以1張計算）</span> ' : '';
  const feeRate=0.001425*discount; const taxRate=isDayTrade?0.0015:0.003;
  let result=null,label='',unitLabel='';
  if(!shortMode){ let P=ceilTick(c1Total/c1Shares); for(let i=0;i<3000;i++){ const sv=P*c1Shares; const fee=Math.max(Math.floor(sv*feeRate),minFeeLot); const tax=Math.floor(sv*taxRate); if(sv-fee-tax-c1Total>=1){result=P;break;} P=+(P+tickSize(P)).toFixed(6); if(P>99999)break; } label='建議最低賣出價'; unitLabel='（獲利 ≥ 1 元）'; }
  else{ let P=floorTick(c1Total/c1Shares); for(let i=0;i<3000;i++){ if(P<0.01){result=null;break;} const sv=P*c1Shares; const fee=Math.max(Math.floor(sv*feeRate),minFeeLot); if(c1Total-(sv+fee)>=1){result=P;break;} P=+(P-tickSize(P)).toFixed(6); } label='建議最高回補價'; unitLabel='（獲利 ≥ 1 元）'; }
  sb.innerHTML=result!==null?`${defaultHint}${label}：<span class="suggest-price">${fmtPrice(result)} 元</span><span style="color:var(--text3)">${unitLabel}</span>`:`<span style="color:var(--text3)">無法計算建議價格</span>`;
}

/* ── Util ── */
function fmt(n){ return n.toFixed(2); }
function fmtI(n){ return (n<0?'-':'')+Math.round(Math.abs(n)).toLocaleString(); }
function setVal(id,val,cls){ const el=document.getElementById(id); el.textContent=val; if(cls!==undefined)el.className=`summary-value${cls?' '+cls:''}`; }
</script>
</body>
</html>
